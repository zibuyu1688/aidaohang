<!DOCTYPE html>
<html lang="zh-CN">
<head>
        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-6ERPFB8LES"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());

            gtag('config', 'G-6ERPFB8LES');
        </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快速配置 - AI导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .step {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: left;
        }
        
        .step h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .api-key {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 16px;
            border-radius: 8px;
            font-family: Monaco, monospace;
            font-size: 14px;
            word-break: break-all;
            margin: 10px 0;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.3);
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        
        .note {
            background: #fff3cd;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
    <h1>🚀 快速开始</h1>
    <p class="subtitle">当前版本由服务端环境变量统一管理 API，无需在浏览器手动配置密钥</p>
        
        <div class="step">
            <h3>📋 步骤1: 服务端已接管密钥</h3>
            <p>DeepSeek API Key 不会再显示在页面中，也不会保存到浏览器本地。</p>
            <div class="api-key" id="apiKeyDisplay">server-managed</div>
        </div>
        
        <div class="step">
            <h3>🎉 步骤2: 开始使用</h3>
            <p>配置完成后，点击下方按钮开始使用：</p>
            <button onclick="goToHomepage()">🏠 进入首页</button>
            <button onclick="testSearch()">🧪 测试搜索</button>
        </div>
        
        <div class="note">
            💡 <strong>提示：</strong>
            <br>• API Key 现在只保存在服务端环境变量中
            <br>• 浏览器端不会保存也不会显示任何真实密钥
            <br>• 试试搜索："抠图"、"去水印"、"AI绘画"
        </div>
    </div>
    
    <script>
        function goToHomepage() {
            window.location.href = '/';
        }
        
        function testSearch() {
            // 保存一个测试搜索词
            sessionStorage.setItem('test_query', '抠图');
            window.location.href = '/?q=抠图';
        }
    </script>
</body>
</html>
